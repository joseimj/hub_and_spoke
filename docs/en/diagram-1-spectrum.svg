<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 268" role="img" aria-label="Spectrum of analytical topologies: Monolith, Hub and Spoke (pragmatic optimum), Pure federation">
  <defs>
    <linearGradient id="axis1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14564A"/><stop offset="0.5" stop-color="#8893A2"/><stop offset="1" stop-color="#3A4F78"/>
    </linearGradient>
    <filter id="sh1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1b2a3a" flood-opacity="0.07"/>
    </filter>
  </defs>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Helvetica,Arial,sans-serif">
    <rect x="1" y="1" width="898" height="266" rx="16" fill="#FCFDFE" stroke="#E8EBEE"/>

    <rect x="44" y="68" width="246" height="122" rx="12" fill="#FFFFFF" stroke="#E4E8EC" filter="url(#sh1)"/>
    <text x="60" y="112" font-size="16.5" font-weight="600" fill="#15212B">Monolith</text>
    <text x="60" y="136" font-size="11" fill="#6B7480">1 project &#183; 1 team models everything</text>
    <text x="60" y="154" font-size="11" fill="#6B7480">maximum consistency &#183; bottleneck</text>

    <rect x="327" y="40" width="246" height="150" rx="12" fill="#ECF3F0" stroke="#A9CDC0" filter="url(#sh1)"/>
    <rect x="327" y="40" width="246" height="4" rx="2" fill="#14564A"/>
    <text x="343" y="74" font-size="9.5" font-weight="600" letter-spacing="1.6" fill="#14564A">PRAGMATIC OPTIMUM</text>
    <g stroke="#14564A" stroke-width="1.3" stroke-linecap="round">
      <line x1="529" y1="66" x2="529" y2="54"/><line x1="529" y1="66" x2="541" y2="66"/>
      <line x1="529" y1="66" x2="529" y2="78"/><line x1="529" y1="66" x2="517" y2="66"/>
    </g>
    <g fill="#14564A"><circle cx="529" cy="66" r="3.6"/><circle cx="529" cy="54" r="2.2"/><circle cx="541" cy="66" r="2.2"/><circle cx="529" cy="78" r="2.2"/><circle cx="517" cy="66" r="2.2"/></g>
    <text x="343" y="116" font-size="20" font-weight="700" fill="#0E3F37">Hub &amp; Spoke</text>
    <text x="343" y="142" font-size="12" fill="#3A4655">governed core + autonomous domains</text>

    <rect x="610" y="68" width="246" height="122" rx="12" fill="#FFFFFF" stroke="#E4E8EC" filter="url(#sh1)"/>
    <text x="626" y="112" font-size="16.5" font-weight="600" fill="#15212B">Pure federation</text>
    <text x="626" y="136" font-size="11" fill="#6B7480">N projects, no shared core</text>
    <text x="626" y="154" font-size="11" fill="#6B7480">maximum autonomy &#183; semantic drift</text>

    <rect x="56" y="221" width="788" height="6" rx="3" fill="url(#axis1)"/>
    <g stroke="#C2C9D2" stroke-width="1.4"><line x1="167" y1="216" x2="167" y2="232"/><line x1="450" y1="213" x2="450" y2="235"/><line x1="733" y1="216" x2="733" y2="232"/></g>
    <path d="M52 224 l11 -5.5 l0 11 z" fill="#14564A"/>
    <path d="M848 224 l-11 -5.5 l0 11 z" fill="#3A4F78"/>
  </g>
</svg>
