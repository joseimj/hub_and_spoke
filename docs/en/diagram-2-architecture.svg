<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 568" role="img" aria-label="Layered architecture: data warehouse, governed layer (hub) and business domains (spokes) up to users">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#1b2a3a" flood-opacity="0.06"/></filter>
    <marker id="arrowN" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L5 9 L10 0" fill="none" stroke="#9AA3AE" stroke-width="1.4"/></marker>
  </defs>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Helvetica,Arial,sans-serif">
    <rect x="1" y="1" width="898" height="566" rx="16" fill="#FCFDFE" stroke="#E8EBEE"/>

    <rect x="270" y="36" width="360" height="56" rx="10" fill="#F2F4F6" stroke="#E3E8EC" filter="url(#sh2)"/>
    <g stroke="#5C6672" stroke-width="1.4" fill="none">
      <ellipse cx="300" cy="58" rx="9" ry="3.6"/><path d="M291 58 v12 a9 3.6 0 0 0 18 0 v-12"/><path d="M291 64 a9 3.6 0 0 0 18 0"/>
    </g>
    <text x="322" y="60" font-size="12.5" font-weight="600" fill="#2C3640">Data warehouse</text>
    <text x="322" y="76" font-size="10.5" fill="#6B7480">one connection &#183; thelook dataset</text>
    <line x1="450" y1="92" x2="450" y2="114" stroke="#9AA3AE" stroke-width="1.4" marker-end="url(#arrowN)"/>

    <rect x="40" y="116" width="820" height="150" rx="14" fill="#ECF3F0" stroke="#BFDBCF"/>
    <g stroke="#14564A" stroke-width="1.1" stroke-linecap="round">
      <line x1="56" y1="137" x2="56" y2="129"/><line x1="56" y1="137" x2="64" y2="137"/><line x1="56" y1="137" x2="56" y2="145"/><line x1="56" y1="137" x2="48" y2="137"/>
    </g>
    <g fill="#14564A"><circle cx="56" cy="137" r="2.6"/><circle cx="56" cy="129" r="1.6"/><circle cx="64" cy="137" r="1.6"/><circle cx="56" cy="145" r="1.6"/><circle cx="48" cy="137" r="1.6"/></g>
    <text x="72" y="141" font-size="10" font-weight="600" letter-spacing="1.4" fill="#14564A">GOVERNED &amp; CERTIFIED LAYER &#183; thelook_hub</text>

    <rect x="60" y="156" width="246" height="92" rx="10" fill="#FFFFFF" stroke="#CFE0D8" filter="url(#sh2)"/>
    <text x="78" y="183" font-size="13" font-weight="600" fill="#15212B">Canonical definitions</text>
    <text x="78" y="205" font-size="11" fill="#6B7480">views &#183; joins &#183; metrics</text>
    <text x="78" y="223" font-size="11" fill="#6B7480">margin &#183; sales &#183; order count</text>

    <rect x="327" y="156" width="246" height="92" rx="10" fill="#FFFFFF" stroke="#CFE0D8" filter="url(#sh2)"/>
    <text x="345" y="183" font-size="13" font-weight="600" fill="#15212B">Access control (PII)</text>
    <text x="345" y="205" font-size="11" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#14564A">access_grant</text>
    <text x="345" y="223" font-size="11" fill="#6B7480">on <tspan font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#14564A">users.email</tspan></text>

    <rect x="594" y="156" width="246" height="92" rx="10" fill="#FFFFFF" stroke="#CFE0D8" filter="url(#sh2)"/>
    <text x="612" y="183" font-size="13" font-weight="600" fill="#15212B">Freshness &amp; cost</text>
    <text x="612" y="205" font-size="11" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#14564A">datagroup</text>
    <text x="612" y="223" font-size="11" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#14564A">ecommerce_etl</text>

    <line x1="450" y1="266" x2="450" y2="306" stroke="#14564A" stroke-width="2"/>
    <path d="M450 308 l-5.5 -11 l11 0 z" fill="#14564A"/>
    <rect x="278" y="275" width="344" height="22" rx="11" fill="#FFFFFF" stroke="#CFE0D8" filter="url(#sh2)"/>
    <text x="450" y="290" font-size="10.5" text-anchor="middle" fill="#23463B">inherit logic + policies &#183; flow in ONE direction only</text>

    <rect x="40" y="306" width="820" height="150" rx="14" fill="#EEF1F7" stroke="#D3DBE8"/>
    <g fill="#3A4F78"><circle cx="50" cy="331" r="1.8"/><circle cx="57" cy="328" r="1.8"/><circle cx="57" cy="334" r="1.8"/></g>
    <text x="70" y="334" font-size="10" font-weight="600" letter-spacing="1.4" fill="#3A4F78">BUSINESS DOMAINS &#8212; autonomous and isolated from one another</text>

    <rect x="60" y="346" width="246" height="92" rx="10" fill="#FFFFFF" stroke="#D9E0EB" filter="url(#sh2)"/>
    <text x="78" y="374" font-size="12.5" font-weight="600" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#2A3C5E">thelook_marketing</text>
    <text x="78" y="398" font-size="10.5" fill="#6B7480"><tspan font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#3A4F78">+order_items</tspan> &#183; dashboards</text>

    <rect x="327" y="346" width="246" height="92" rx="10" fill="#FFFFFF" stroke="#D9E0EB" filter="url(#sh2)"/>
    <text x="345" y="374" font-size="12.5" font-weight="600" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#2A3C5E">thelook_operations</text>
    <text x="345" y="398" font-size="10.5" fill="#6B7480"><tspan font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#3A4F78">+order_items</tspan> &#183; dashboards</text>

    <rect x="594" y="346" width="246" height="92" rx="10" fill="#FBFCFD" stroke="#C3CAD8" stroke-dasharray="5 4"/>
    <g stroke="#8A94A3" stroke-width="1.5" stroke-linecap="round"><line x1="612" y1="368" x2="624" y2="368"/><line x1="618" y1="362" x2="618" y2="374"/></g>
    <text x="634" y="374" font-size="12.5" font-weight="600" fill="#7A8490">new spoke</text>
    <text x="612" y="398" font-size="10.5" fill="#9AA3AE">finance, &#8230;</text>

    <line x1="450" y1="456" x2="450" y2="480" stroke="#9AA3AE" stroke-width="1.4" marker-end="url(#arrowN)"/>

    <rect x="270" y="486" width="360" height="52" rx="10" fill="#F2F4F6" stroke="#E3E8EC" filter="url(#sh2)"/>
    <g fill="#5C6672"><circle cx="296" cy="512" r="3"/><circle cx="307" cy="512" r="3"/><circle cx="318" cy="512" r="3"/></g>
    <text x="334" y="516" font-size="11.5" font-weight="600" fill="#2C3640">Business users &#183; Explore &#183; dashboards</text>
  </g>
</svg>
